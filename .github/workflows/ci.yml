name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      POSTGRES_HOST: localhost
      POSTGRES_USER: swen732
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_DB: swen732
      POSTGRES_PORT: "5432"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: swen732
          POSTGRES_PASSWORD: supersecurepassword
          POSTGRES_DB: swen732
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U swen732 -d swen732"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Smoke tests
        run: pytest tests/ -v

      - name: Start Flask server
        run: |
          nohup python api/src/server.py > /tmp/flask.log 2>&1 &
          echo $! > /tmp/flask.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null 2>&1; then
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/flask.pid)" 2>/dev/null; then
              echo "Flask exited unexpectedly. Log:"
              cat /tmp/flask.log
              exit 1
            fi
            sleep 1
          done
          echo "Flask failed to become ready. Log:"
          cat /tmp/flask.log
          exit 1

      - name: Run all tests with coverage
        run: pytest api/test/ database/test/ -v --cov --cov-branch --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: financial-tracker
        run: npm install

      - name: Run frontend tests
        working-directory: financial-tracker
        run: npx vitest run

      - name: Stop Flask server
        if: always()
        run: |
          if [ -f /tmp/flask.pid ]; then kill "$(cat /tmp/flask.pid)" 2>/dev/null || true; fi

  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ellamn"

      - name: Install frontend dependencies
        working-directory: financial-tracker
        run: npm install

      - name: Build frontend
        working-directory: financial-tracker
        run: npm run build

      - name: Publish to GitHub Packages
        working-directory: financial-tracker
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}